name: auto-train

# Weekly autonomous re-training on a self-hosted GPU runner.
# Idempotent: skips steps whose outputs already exist.
# Promotes the new checkpoint only if it beats the previous champion.

on:
  schedule:
    - cron: "17 5 * * 1"   # every Monday 05:17 UTC
  workflow_dispatch:
    inputs:
      model_version:
        description: "model version tag (default: timestamp)"
        required: false
      image_datasets:
        description: "image datasets to include (comma-separated, default: none)"
        required: false
        default: ""

jobs:
  train:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 720
    env:
      PY: apps/ml-api/.venv/bin/python
    steps:
      - uses: actions/checkout@v4
      - name: Verify GPU available
        run: python -c "import torch; assert torch.cuda.is_available(), 'No GPU detected -- aborting training job'"
      - name: Install backend deps
        run: |
          python -m venv apps/ml-api/.venv
          apps/ml-api/.venv/bin/pip install -r apps/ml-api/requirements.txt
      - name: Install training-only deps (wfdb for PhysioNet)
        run: apps/ml-api/.venv/bin/pip install wfdb 'tqdm>=4.65'
      - name: Run autonomous trainer
        env:
          MODEL_VERSION: ${{ github.event.inputs.model_version }}
          IMAGE_DATASETS: ${{ github.event.inputs.image_datasets }}
          EPOCHS: "30"
          BATCH_SIZE: "256"
          WORKERS: "8"
          PROMOTE: "1"
          BASELINE: eval/baselines/synth_v1.json
        run: scripts/train_autonomous.sh
      - name: Upload candidate artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: training-run
          path: |
            runs/**/state.json
            runs/**/eval/*.json
            runs/**/eval/*.html
            runs/**/pretrain/checkpoint.pt.yaml
            apps/ml-api/weights/*.pt.yaml
      - name: Open PR if a new champion was promoted
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n $(git status --porcelain apps/ml-api/weights/) ]]; then
            BRANCH="auto-train/$(date +%Y%m%dT%H%M%S)"
            git checkout -b "$BRANCH"
            git config user.email "auto-train@heartscan"
            git config user.name "auto-train"
            git add apps/ml-api/weights/
            git commit -m "auto-train: promote new checkpoint"
            git push -u origin "$BRANCH"
            cat > /tmp/auto-train-pr-body.md <<'EOF'
          Automatic promotion from the weekly trainer. Compare eval reports in the run artefacts.

          ## IMPORTANT: Cardiology Sign-Off Required

          This PR promotes a new ML model checkpoint for clinical ECG classification.
          A qualified cardiologist MUST review and approve this PR before merging.

          - [ ] Cardiologist has reviewed the eval report and confusion matrix
          - [ ] Performance regressions on known arrhythmia classes have been investigated
          - [ ] Model has been validated against held-out clinical test set
          - [ ] Sign-off documented in PR comments by @cardiology-reviewers
          EOF
            gh pr create --title "auto-train: promote new checkpoint" \
              --body-file /tmp/auto-train-pr-body.md \
              --label "auto-train" \
              --label "requires-cardiology-review"
          else
            echo "No promotion this run."
          fi
