# Manual: register Clerk JWT template + Supabase third-party auth using repo secrets.
# Add secrets in GitHub → Settings → Secrets:
#   CLERK_SECRET_KEY, NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, NEXT_PUBLIC_SUPABASE_URL,
#   SUPABASE_ACCESS_TOKEN
name: Clerk Supabase integrations

on:
  workflow_dispatch:

jobs:
  ensure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write env for scripts
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p apps/web
          cat > apps/web/.env.local <<EOF
          CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          SUPABASE_ACCESS_TOKEN=${SUPABASE_ACCESS_TOKEN}
          EOF
      - name: Bootstrap integrations
        run: chmod +x scripts/*.sh && ./scripts/bootstrap_clerk_supabase.sh
