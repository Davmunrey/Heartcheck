name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies (locked)
        run: |
          uv pip install --system -r requirements.lock
          uv pip install --system -e .
          uv pip install --system -e ../../ml --no-deps
      - name: pip-audit
        run: |
          uv pip install --system pip-audit
          pip-audit -r requirements.txt --desc on
      - name: Ruff
        run: ruff check app tests
      - name: Pytest
        run: pytest tests/ -q

  ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install ML package
        run: uv pip install --system -e "ml[dev]"
      - name: Ruff (ML)
        run: ruff check ml
      - name: Pytest (ML)
        run: pytest ml/tests -q

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze
      - run: flutter test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: npm ci
      - name: Lint (web)
        run: npm run lint -w @heartscan/web
      - name: Test (web)
        run: npm test -w @heartscan/web
      - name: Test (api-client)
        run: npm test -w @heartscan/api-client
      - name: Codegen drift check
        run: npm run codegen:check
