name: heartscan_mobile
description: HeartScan — ECG capture and educational analysis (Flutter client).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  http: ^1.2.0
  image_picker: ^1.0.7
  camera: ^0.11.0
  fl_chart: ^0.69.0
  pdf: ^3.10.8
  printing: ^5.13.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  uuid: ^4.0.0
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
